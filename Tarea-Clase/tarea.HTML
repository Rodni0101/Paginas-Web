<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilo.css">
    <script src="Logica/logica.js" defer></script>
    <title>Registro de productos</title>
</head>

<body>

    <h1>Registro de producto</h1>
    <hr>

    <form id="registroProducto" class="cuadros">

        <label for="codigo">Código</label>
        <input id="codigo" type="text" placeholder="Código de Producto">

        <label for="producto">Producto</label>
        <input id="producto" type="text" placeholder="Nombre del Producto">

        <label for="valor">Valor</label>
        <input id="valor" type="number" placeholder="Valor del producto">

        <label for="cantidad">Cantidad</label>
        <input id="cantidad" type="number" placeholder="Cantidad">

        <label for="total">Total</label>
        <input id="total" type="number" placeholder="Total" readonly>

        <div class="boton">
            <button type="button" onclick="verVentas()">Ver ventas</button>
            <button type="button" id="limpiar">Limpiar</button>
        </div>

    </form>

</body>

</html>
